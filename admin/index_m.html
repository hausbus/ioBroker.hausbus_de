<script type="text/javascript" src="words.js"></script>

<!-- you have to define 2 functions in the global scope: -->
<script type="text/javascript">

    // the function loadSettings has to exist ...
    function load(settings, onChange) {
        // example: select elements with id=key and class=value and insert value
       if (!settings) return;
        $('.value').each(function () {
            var $key = $(this);
            var id = $key.attr('id');
            if ($key.attr('type') === 'checkbox') {
		        // do not call onChange direct, because onChange could expect some arguments
                $key.prop('checked', settings[id]).change(function() {

					if ($('#sync_roomsandscenes').prop('checked') && $('#devicetype').val() == 'eNet Server')
					{
						$('#sync_roomsandscenes').prop('checked', false);
					}
					if ($('#connection_type_ssl').prop('checked') && $('#devicetype').val() == 'eNet Gateway')
					{
						$('#connection_type_ssl').prop('checked', false);
					}
					onChange();
                });
            } else {
		        // do not call onChange direct, because onChange could expect some arguments
                $key.val(settings[id]).change(function() {
				onChange();
                }).keyup(function() 
				{
                    onChange();
                });
            }
        });

		switch($('#devicetype').val())
		{
			case 'Server':
				$('#username').show();
				$('#usernamelabel').show();
				$('#password').show();
				$('#passwordlabel').show();
				$('#connection_type_ssl').removeClass('disabled');
				$('#connection_port').removeClass('disabled');
				$('#sync_roomsandscenes').addClass('disabled');
				$('#sync_roomsandscenes').prop('checked', false);
			break;
			
			case 'Gateway':
				$('#username').hide();
				$('#usernamelabel').hide();
				$('#password').hide();
				$('#passwordlabel').hide();
				$('#connection_type_ssl').addClass('disabled');
				$('#connection_port').addClass('disabled');
				$('#connection_type_ssl').prop('checked', false);
				$('#sync_roomsandscenes').removeClass('disabled');
			break;
			
			default:			
		}
		
	
        $('#devicetype').change(function () 
		{
            switch ($(this).val()) 
			{
                case 'Server':
					$('#username').show();
					$('#usernamelabel').show();
					$('#password').show();
					$('#passwordlabel').show();
					$('#connection_type_ssl').removeClass('disabled');
					$('#connection_port').removeClass('disabled');
					$('#sync_roomsandscenes').addClass('disabled');
					$('#sync_roomsandscenes').prop('checked', false);
				break;

                case 'Gateway':
					$('#username').hide();
					$('#usernamelabel').hide();
					$('#password').hide();
					$('#passwordlabel').hide();
					$('#connection_type_ssl').addClass('disabled');
					$('#connection_port').addClass('disabled');
					$('#connection_type_ssl').prop('checked', false);
					$('#sync_roomsandscenes').removeClass('disabled');
				break;

                default:
            }
        });
		
        onChange(false);
    }

    // ... and the function save has to exist.
    // you have to make sure the callback is called with the settings object as first param!
    function save(callback) {
        // example: select elements with class=value and build settings object
        var obj = {};
        $('.value').each(function () {
            var $this = $(this);
			if ($this.attr('type') === 'checkbox') {
				obj[$this.attr('id')] = $this.prop('checked');
			} else {
				obj[$this.attr('id')] = $this.val();
			}
        });
        callback(obj);
    }
</script>
</head>

		 </table>
    </div>
</body>
