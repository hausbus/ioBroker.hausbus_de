version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: monthly
    time: "04:00"
    timezone: Europe/Berlin
  open-pull-requests-limit: 20
  assignees:
  - hausbusde
  versioning-strategy: increase

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly" # Überprüft wöchentlich auf neue Action-Versionen
